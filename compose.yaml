services:
  # PostgreSQL Database
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - auth-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-auth_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports:
    #   - "5433:5432" # Dev local uniquement — à ne pas exposer en prod

  # Redis Cache
  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - auth-internal
    volumes:
      - auth-redis-data:/data
    # ports:
    #   - "6380:6379" # Dev local uniquement

  # Backend NestJS
  auth-backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
      target: ${BACKEND_TARGET:-runner}
    container_name: auth-backend
    restart: unless-stopped
    command: ${BACKEND_COMMAND:-sh -c "node dist/main.js & nginx -g 'daemon off;'"}
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@auth-db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@auth-redis:6379
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_started
    networks:
      - auth-internal
    expose:
      - "3000"
    # ports:
    #   - "3000:3000" # Dev local uniquement — Coolify route via Traefik

  # Frontend Vue 3
  auth-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: auth-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    networks:
      - auth-internal
    expose:
      - "8080"
    # ports:
    #   - "5174:8080" # Dev local uniquement

networks:
  auth-internal:
    driver: bridge

volumes:
  auth-db-data:
  auth-redis-data:
